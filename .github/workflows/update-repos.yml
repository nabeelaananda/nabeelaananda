name: Update Recent Repos
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap jam

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "RECENT_REPOS"
          feed_list: "https://github.com/nabeelaananda.atom"
          max_post_count: 5 
          template: "- [ $title ]($url) - $description"
