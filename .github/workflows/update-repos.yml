name: Update README recent repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build recent repo list
        env:
          USERNAME: nabeelaananda
        run: |
          repos_json=$(curl -s "https://api.github.com/users/$USERNAME/repos?type=public&sort=updated&per_page=100")
          echo "$repos_json" | jq -r '
            .[]
            | select(.name != env.USERNAME)
            | "- [" + .name + "](" + .html_url + ") — " + (.description // "No description")
          ' | head -n 6 > recent_repos.md
          
      - name: Update README markers
        run: |
          START="<!-- RECENT_REPOS:START -->"
          END="<!-- RECENT_REPOS:END -->"

          awk -v start="$START" -v end="$END" '
            BEGIN {inblock=0}
            $0==start {print; inblock=1; system("cat recent_repos.md"); next}
            $0==end {inblock=0; print; next}
            inblock==0 {print}
          ' README.md > README.new.md

          mv README.new.md README.md

      - name: Commit & push (if changed)
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update recent repos in README"
          git push
